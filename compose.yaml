services:
  app:
    build:
      context: .
    environment:
      APP_URL: ${APP_URL:-http://localhost:3000}
      IMAGINE_STORAGE_TARGET: browser
      NEXT_PUBLIC_APP_VERSION: ${NEXT_PUBLIC_APP_VERSION:-0.2.0}
      OPENAI_COMPAT_API_KEY: ${OPENAI_COMPAT_API_KEY:-}
    ports:
      - "3000:3000"
