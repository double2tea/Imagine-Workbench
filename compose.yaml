services:
  app:
    build:
      context: .
    environment:
      APP_URL: ${APP_URL:-http://localhost:3000}
      IMAGINE_STORAGE_TARGET: browser
      OPENAI_COMPAT_API_KEY: ${OPENAI_COMPAT_API_KEY:-}
    ports:
      - "${APP_PORT:-3000}:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/storage/local/status').then(async (response) => { if (!response.ok) process.exit(1); const status = await response.json(); if (status.mode !== 'browser' || status.targetKind !== 'indexeddb') process.exit(1); }).catch(() => process.exit(1));",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
