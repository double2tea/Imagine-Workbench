services:
  app:
    build:
      context: .
    environment:
      APP_URL: http://localhost:3000
      DATABASE_URL: postgresql://imagine:imagine_password@db:5432/imagine_workbench
      IMAGINE_MEDIA_DIR: /data/imagine-media
      IMAGINE_STORAGE_TARGET: postgres
      IMAGINE_TEAM_SETUP_TOKEN: replace_with_a_long_random_setup_token
      NEXT_PUBLIC_APP_VERSION: ${NEXT_PUBLIC_APP_VERSION:-0.1.0}
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - imagine-media:/data/imagine-media

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: imagine_workbench
      POSTGRES_USER: imagine
      POSTGRES_PASSWORD: imagine_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U imagine -d imagine_workbench"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  imagine-media:
  postgres-data:
