      <stop offset="0.52" stop-color="#ffb8bd"/>
      <stop offset="1" stop-color="#c9607f"/>
    </radialGradient>
    <linearGradient id="roseShade" x1="218" y1="136" x2="460" y2="500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" stop-opacity="0.7"/>
      <stop offset="0.45" stop-color="#ffe1e6" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#6f365f" stop-opacity="0.28"/>
    </linearGradient>
    <radialGradient id="roseGlow" cx="0" cy="0" r="1" gradientTransform="matrix(220 0 0 196 346 346)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ff9db0" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#ff9db0" stop-opacity="0"/>
