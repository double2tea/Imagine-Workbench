<svg width="1280" height="940" viewBox="0 0 1280 940" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .page { fill: #111722; }
      .title { fill: #edf2f7; font: 700 28px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0; }
      .note { fill: #9aa8b8; font: 500 15px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0; }
      .label { fill: #e8edf4; font: 700 18px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0; }
      .tiny { fill: #a7b3c2; font: 600 12px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0; }
      .card { fill: #151c28; stroke: rgba(255,255,255,0.08); }
      .light-bg { fill: #eef3f8; }
      .dark-bg { fill: #07080b; }
      .eye { fill: #282338; }
      .eye-soft { fill: #242b38; }
      .glint { fill: #ffffff; }
      .line { stroke: rgba(255,255,255,0.58); stroke-width: 6; stroke-linecap: round; }
    </style>

    <radialGradient id="champagneBody" cx="0" cy="0" r="1" gradientTransform="matrix(178 210 -226 192 336 202)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fff8e8"/>
      <stop offset="0.5" stop-color="#ffd58d"/>
      <stop offset="1" stop-color="#ef896c"/>
    </radialGradient>
    <linearGradient id="champagneShade" x1="218" y1="136" x2="460" y2="500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" stop-opacity="0.72"/>
      <stop offset="0.45" stop-color="#fff2c8" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#a83f63" stop-opacity="0.28"/>
    </linearGradient>
    <radialGradient id="champagneGlow" cx="0" cy="0" r="1" gradientTransform="matrix(220 0 0 196 346 346)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffcf8d" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#ffcf8d" stop-opacity="0"/>
