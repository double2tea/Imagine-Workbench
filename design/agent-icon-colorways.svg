      <circle cx="346" cy="346" r="274" fill="url(#roseGlow)"/>
      <g filter="url(#softShadow)">
        <path d="M321 108c28-34 88-20 101 22 46-4 84 29 87 75 39 14 64 51 59 94-6 51-49 89-99 93-15 47-61 80-114 80-39 0-75-18-98-45-46 18-100-1-121-44-46-5-80-43-80-89 0-42 29-78 69-88-4-10-6-21-6-32 0-54 45-98 99-98 22 0 43 7 59 19 8-8 17-14 30-17Z" fill="url(#roseBody)"/>
        <path d="M321 108c28-34 88-20 101 22 46-4 84 29 87 75 39 14 64 51 59 94-6 51-49 89-99 93-15 47-61 80-114 80-39 0-75-18-98-45-46 18-100-1-121-44-46-5-80-43-80-89 0-42 29-78 69-88-4-10-6-21-6-32 0-54 45-98 99-98 22 0 43 7 59 19 8-8 17-14 30-17Z" fill="url(#roseShade)"/>
        <path d="M160 220c28-38 75-54 119-40 30-39 93-43 129-8" class="line" opacity="0.58"/>
        <ellipse cx="214" cy="345" rx="34" ry="47" class="eye"/>
        <ellipse cx="370" cy="345" rx="34" ry="47" class="eye"/>
        <circle cx="203" cy="328" r="11" class="glint"/>
        <circle cx="359" cy="328" r="11" class="glint"/>
        <circle cx="226" cy="364" r="5" fill="#ffffff" opacity="0.42"/>
        <circle cx="382" cy="364" r="5" fill="#ffffff" opacity="0.42"/>
        <ellipse cx="184" cy="420" rx="62" ry="36" fill="url(#blushWarm)"/>
        <ellipse cx="410" cy="420" rx="62" ry="36" fill="url(#blushWarm)"/>
        <circle cx="404" cy="228" r="14" fill="#fff4d5" opacity="0.92"/>
      </g>
    </symbol>
    <symbol id="agentViolet" viewBox="0 0 760 760">
      <circle cx="346" cy="346" r="274" fill="url(#violetGlow)"/>
      <g filter="url(#softShadow)">
        <path d="M321 108c28-34 88-20 101 22 46-4 84 29 87 75 39 14 64 51 59 94-6 51-49 89-99 93-15 47-61 80-114 80-39 0-75-18-98-45-46 18-100-1-121-44-46-5-80-43-80-89 0-42 29-78 69-88-4-10-6-21-6-32 0-54 45-98 99-98 22 0 43 7 59 19 8-8 17-14 30-17Z" fill="url(#violetBody)"/>
        <path d="M321 108c28-34 88-20 101 22 46-4 84 29 87 75 39 14 64 51 59 94-6 51-49 89-99 93-15 47-61 80-114 80-39 0-75-18-98-45-46 18-100-1-121-44-46-5-80-43-80-89 0-42 29-78 69-88-4-10-6-21-6-32 0-54 45-98 99-98 22 0 43 7 59 19 8-8 17-14 30-17Z" fill="url(#violetShade)"/>
        <path d="M160 220c28-38 75-54 119-40 30-39 93-43 129-8" class="line" opacity="0.58"/>
