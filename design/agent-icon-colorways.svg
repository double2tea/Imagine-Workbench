  <rect class="page" width="1280" height="940"/>
  <text x="64" y="58" class="title">Agent icon colorways - no mouth mascot</text>
  <text x="64" y="88" class="note">Each route is tested on current app light/dark theme backgrounds. Body color stays stable; aura/shadow can adapt by theme.</text>

  <g transform="translate(64 126)">
    <rect class="card" width="270" height="350" rx="18"/>
    <text x="20" y="34" class="label">A. Champagne Coral</text>
    <text x="20" y="58" class="tiny">recommended / warm neutral</text>
    <rect class="dark-bg" x="20" y="82" width="110" height="110" rx="18"/>
    <rect class="light-bg" x="140" y="82" width="110" height="110" rx="18"/>
    <use href="#agentChampagne" x="8" y="68" width="155" height="155"/>
    <use href="#agentChampagne" x="128" y="68" width="155" height="155"/>
    <text x="20" y="230" class="note">Cream, amber, soft coral.</text>
    <text x="20" y="256" class="note">Friendly without feeling blue/green.</text>
    <text x="20" y="300" class="tiny">#FFF8E8  #FFD58D  #EF896C</text>
  </g>

  <g transform="translate(366 126)">
    <rect class="card" width="270" height="350" rx="18"/>
    <text x="20" y="34" class="label">B. Rose Ember</text>
    <text x="20" y="58" class="tiny">soft, emotional, visible</text>
    <rect class="dark-bg" x="20" y="82" width="110" height="110" rx="18"/>
    <rect class="light-bg" x="140" y="82" width="110" height="110" rx="18"/>
    <use href="#agentRose" x="8" y="68" width="155" height="155"/>
    <use href="#agentRose" x="128" y="68" width="155" height="155"/>
    <text x="20" y="230" class="note">Warm pink with muted depth.</text>
    <text x="20" y="256" class="note">Cute, slightly more expressive.</text>
    <text x="20" y="300" class="tiny">#FFF3F5  #FFB8BD  #C9607F</text>
  </g>

  <g transform="translate(668 126)">
    <rect class="card" width="270" height="350" rx="18"/>
    <text x="20" y="34" class="label">C. Moon Apricot</text>
    <text x="20" y="58" class="tiny">cooler, still not blue</text>
    <rect class="dark-bg" x="20" y="82" width="110" height="110" rx="18"/>
    <rect class="light-bg" x="140" y="82" width="110" height="110" rx="18"/>
    <use href="#agentViolet" x="8" y="68" width="155" height="155"/>
    <use href="#agentViolet" x="128" y="68" width="155" height="155"/>
    <text x="20" y="230" class="note">Tiny violet cast, apricot top.</text>
    <text x="20" y="256" class="note">Feels more magical/agentic.</text>
    <text x="20" y="300" class="tiny">#FFF7EA  #E5C4FF  #A889F2</text>
  </g>

  <g transform="translate(970 126)">
    <rect class="card" width="270" height="350" rx="18"/>
    <text x="20" y="34" class="label">D. Pearl Taupe</text>
    <text x="20" y="58" class="tiny">quiet, most brand-safe</text>
    <rect class="dark-bg" x="20" y="82" width="110" height="110" rx="18"/>
    <rect class="light-bg" x="140" y="82" width="110" height="110" rx="18"/>
    <use href="#agentPearl" x="8" y="68" width="155" height="155"/>
    <use href="#agentPearl" x="128" y="68" width="155" height="155"/>
    <text x="20" y="230" class="note">Pearl, sand, muted stone.</text>
    <text x="20" y="256" class="note">Least playful, cleanest in UI.</text>
    <text x="20" y="300" class="tiny">#FFFDF4  #E8D6B6  #9FB2B6</text>
  </g>

  <g transform="translate(64 560)">
    <text x="0" y="0" class="label">Recommendation</text>
    <text x="0" y="34" class="note">Pick A if the Agent should feel friendly and warm while staying readable in both themes.</text>
    <text x="0" y="62" class="note">Pick D if you want the least cartoonish direction; it will blend into the workstation more quietly.</text>
    <text x="0" y="90" class="note">I would avoid C unless you want a more magical personality; it risks drifting into a familiar purple AI look.</text>
  </g>
</svg>
