      <stop offset="0.45" stop-color="#f6ead3" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#2f5260" stop-opacity="0.24"/>
    </linearGradient>
    <radialGradient id="pearlGlow" cx="0" cy="0" r="1" gradientTransform="matrix(220 0 0 196 346 346)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#e7d6b8" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#e7d6b8" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="blushWarm" cx="0" cy="0" r="1" gradientTransform="matrix(78 0 0 46 340 414)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ff8ca8" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#ff8ca8" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="80" y="56" width="590" height="600" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="20" stdDeviation="28" flood-color="#0f172a" flood-opacity="0.22"/>
    </filter>

