    <circle cx="305" cy="328" r="11" class="glint"/>
    <circle cx="461" cy="328" r="11" class="glint"/>
    <ellipse cx="286" cy="417" rx="60" ry="34" fill="url(#blush)"/>
    <ellipse cx="508" cy="417" rx="60" ry="34" fill="url(#blush)"/>
    <path d="M350 409c20 29 43 42 68 42s48-13 68-42" class="smile" fill="none"/>
    <circle cx="512" cy="240" r="14" fill="#fff4d5" opacity="0.95"/>
  </g>

