      <ellipse cx="207" cy="157" rx="24" ry="34" class="eye"/>
      <circle cx="81" cy="146" r="8" class="glint"/>
      <circle cx="199" cy="146" r="8" class="glint"/>
      <path d="M123 214c16 23 35 34 54 34s38-11 54-34" stroke="#282338" stroke-width="9" stroke-linecap="round" fill="none"/>
    </g>
    <g transform="translate(210 0) scale(0.24)">
      <path d="M160 14c22-27 70-16 80 18 37-3 67 23 70 60 31 11 51 41 47 76-5 41-39 71-79 74-12 38-49 64-91 64-31 0-60-14-79-36-37 14-80-1-97-35-37-4-64-34-64-72 0-34 23-62 55-70-3-8-5-17-5-26 0-43 36-78 79-78 18 0 34 6 47 15 6-6 14-11 24-14Z" fill="url(#bodyWarm)"/>
      <ellipse cx="89" cy="157" rx="24" ry="34" class="eye"/>
      <ellipse cx="207" cy="157" rx="24" ry="34" class="eye"/>
      <circle cx="81" cy="146" r="8" class="glint"/>
      <circle cx="199" cy="146" r="8" class="glint"/>
      <path d="M123 214c16 23 35 34 54 34s38-11 54-34" stroke="#282338" stroke-width="9" stroke-linecap="round" fill="none"/>
    </g>
    <text x="0" y="236" class="note">Readable at dock size and favicon scale.</text>
  </g>

  <g transform="translate(810 464)">
    <text x="0" y="-42" class="label">Interaction notes</text>
    <text x="0" y="0" class="note">Hover: tiny lift + eye tracking, no shell animation.</text>
    <text x="0" y="30" class="note">Drag: body squashes 4%, aura follows softly.</text>
    <text x="0" y="60" class="note">Theme: mark stays stable; only shadow/aura changes.</text>
    <text x="0" y="90" class="note">Avoid: blue, green, glass rings, nested app icon.</text>
  </g>
