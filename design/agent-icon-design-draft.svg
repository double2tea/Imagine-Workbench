<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bodyWarm" cx="0" cy="0" r="1" gradientTransform="matrix(178 210 -226 192 444 214)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fff9e8"/>
      <stop offset="0.48" stop-color="#ffd48a"/>
      <stop offset="1" stop-color="#f08c65"/>
    </radialGradient>
    <linearGradient id="bodyShade" x1="326" y1="148" x2="568" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" stop-opacity="0.72"/>
      <stop offset="0.42" stop-color="#fff4cf" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#b6475f" stop-opacity="0.3"/>
    </linearGradient>
    <radialGradient id="blush" cx="0" cy="0" r="1" gradientTransform="matrix(70 0 0 42 448 401)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ff8ca8" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#ff8ca8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="softGlow" cx="0" cy="0" r="1" gradientTransform="matrix(238 0 0 210 454 346)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffcf8d" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#ffcf8d" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="238" y="70" width="550" height="570" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="22" stdDeviation="30" flood-color="#7a2f49" flood-opacity="0.2"/>
    </filter>
    <filter id="tinyShadow" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#7a2f49" flood-opacity="0.2"/>
    </filter>
    <style>
      .bg { fill: #111722; }
      .label { fill: #e8edf4; font: 600 22px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0; }
      .note { fill: #9aa8b8; font: 500 15px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0; }
      .eye { fill: #282338; }
      .glint { fill: #ffffff; }
      .smile { stroke: #282338; stroke-width: 12; stroke-linecap: round; }
      .line { stroke: rgba(255,255,255,0.54); stroke-width: 6; stroke-linecap: round; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="760" rx="0"/>
  <circle cx="454" cy="346" r="262" fill="url(#softGlow)"/>

  <text x="76" y="56" class="label">Agent icon draft - warm plush sprite</text>
  <text x="76" y="86" class="note">No blue, no outer ball shell, no inner logo. Single mascot mark for app logo and draggable agent.</text>

