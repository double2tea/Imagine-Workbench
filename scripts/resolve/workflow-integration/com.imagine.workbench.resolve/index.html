<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' file: data:; connect-src 'self' http: https:" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Imagine Workbench</title>
    <link rel="stylesheet" href="./css/app.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="brand">
          <div class="mark">IW</div>
          <div>
            <div class="brand-title">Imagine Workbench</div>
            <div class="brand-subtitle">DaVinci Resolve Workflow Integration</div>
          </div>
        </div>
        <button class="ghost-button" id="doctorButton" type="button"><span class="button-dot"></span>连接检查</button>
      </header>

      <nav class="tabs" aria-label="功能分类">
        <button class="tab active" type="button" data-tab="image">图像</button>
        <button class="tab" type="button" data-tab="video">视频</button>
        <button class="tab" type="button" data-tab="audio">音频</button>
        <button class="tab" type="button" data-tab="apps">全部</button>
      </nav>

      <section class="section-head">
        <h1 id="sectionTitle">工具</h1>
        <p id="sectionSubtitle">生成或编辑当前画面</p>
      </section>

      <section class="app-grid" id="operationGrid" aria-label="功能"></section>

      <section class="prompt-panel">
        <div class="composer-head">
          <div>
            <div class="composer-title">创作指令</div>
            <label class="field-label" for="promptInput" id="promptLabel">提示词</label>
          </div>
        </div>
        <textarea id="promptInput" placeholder="描述生成或编辑需求"></textarea>

        <div class="source-block" id="sourceBlock">
          <div class="field-label">参考源</div>
          <div class="pill-row" id="sourcePills"></div>
        </div>

        <div class="look-preset-block hidden" id="lookPresetBlock">
          <div class="field-label">风格预设</div>
          <div class="look-preset-grid" id="lookPresetGrid" aria-label="AI LUT 风格预设"></div>
        </div>

        <div class="mask-prepare hidden" id="maskPrepareBlock">
          <div>
            <div class="field-label">遮罩</div>
            <p id="maskPrepareHint">重绘、擦除、扩图需要先准备遮罩</p>
          </div>
          <button class="small-button primary" id="maskPrepareButton" type="button">打开遮罩编辑器</button>
        </div>

        <div class="option-grid">
          <label class="field">
            <span>工作台地址</span>
            <input id="baseUrlInput" type="text" value="http://localhost:3000" />
          </label>
          <label class="field">
            <span>输出名称</span>
            <input id="outputNameInput" type="text" placeholder="可选" />
          </label>
          <label class="field" id="imageOperationField">
            <span>图片操作</span>
            <select id="imageOperationInput">
              <option value="redraw">重绘</option>
              <option value="erase">擦除</option>
              <option value="outpaint">扩图</option>
              <option value="cutout">抠图</option>
            </select>
          </label>
          <label class="field" id="pollSecondsField">
            <span>轮询秒数</span>
            <input id="pollSecondsInput" type="number" min="30" max="3600" step="30" value="600" />
          </label>
          <label class="field" id="languageField">
            <span>语言</span>
            <input id="languageInput" type="text" value="auto" />
          </label>
        </div>

        <details class="advanced">
          <summary>供应商连接</summary>
          <div class="option-grid">
            <label class="field">
              <span>12AI Key</span>
              <input id="twelveApiKeyInput" type="password" placeholder="留空使用 Workbench 已保存 Key" />
            </label>
            <label class="field">
              <span>MiMo Key</span>
              <input id="mimoApiKeyInput" type="password" placeholder="留空使用 Workbench 已保存 Key" />
            </label>
            <label class="field">
              <span>Base URL</span>
              <input id="providerBaseUrlInput" type="text" placeholder="可选" />
            </label>
            <label class="field">
              <span>供应商标签</span>
              <input id="providerLabelInput" type="text" placeholder="可选" />
            </label>
          </div>
          <label class="check remember-check">
            <input id="rememberKeysInput" type="checkbox" />
            <span>在此插件中记住 Key</span>
          </label>
        </details>

        <div class="runbar">
          <button class="small-button" id="saveButton" type="button">保存任务</button>
          <button class="small-button" id="openOutputButton" type="button">打开输出目录</button>
          <button class="small-button" id="previewOutputButton" type="button" disabled>预览结果</button>
          <button class="small-button" id="importResultButton" type="button" disabled>导入结果</button>
          <label class="check import-check">
            <input id="importInput" type="checkbox" checked />
            <span>导入达芬奇</span>
          </label>
          <label class="check append-check">
            <input id="appendInput" type="checkbox" />
            <span>追加到时间线</span>
          </label>
          <button class="run-button" id="runButton" type="button">运行</button>
        </div>
      </section>

      <section class="status" id="statusOutput">准备就绪</section>

      <section class="mask-editor hidden" id="maskEditorModal" aria-label="遮罩编辑器">
        <div class="mask-editor-panel">
          <div class="mask-editor-head">
            <div>
              <h2 id="maskEditorTitle">遮罩编辑</h2>
              <p id="maskEditorHint">涂白需要处理的区域</p>
            </div>
            <button class="small-button" id="maskCancelButton" type="button">取消</button>
          </div>
          <canvas id="maskEditorCanvas" width="960" height="540"></canvas>
          <div class="mask-toolbar">
            <label class="field" id="brushSizeField">
              <span>画笔</span>
              <input id="brushSizeInput" type="range" min="6" max="120" value="32" />
            </label>
            <div class="outpaint-grid hidden" id="outpaintFields">
              <label class="field">
                <span>左</span>
                <input id="outpaintLeftInput" type="number" min="0" max="1200" step="16" value="0" />
              </label>
              <label class="field">
                <span>右</span>
                <input id="outpaintRightInput" type="number" min="0" max="1200" step="16" value="256" />
              </label>
              <label class="field">
                <span>上</span>
                <input id="outpaintTopInput" type="number" min="0" max="1200" step="16" value="0" />
              </label>
              <label class="field">
                <span>下</span>
                <input id="outpaintBottomInput" type="number" min="0" max="1200" step="16" value="0" />
              </label>
            </div>
            <div class="mask-actions">
              <button class="small-button" id="maskClearButton" type="button">清空</button>
              <button class="small-button primary" id="maskApplyButton" type="button" disabled>应用遮罩</button>
            </div>
          </div>
        </div>
      </section>
    </main>
    <script src="./js/app.js"></script>
  </body>
</html>
